<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f0c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Solitaire" />
    <title>Solitaire</title>
    <script>
      // Set theme + language before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('solitaire:settings');
          var settings = stored ? JSON.parse(stored) : null;
          var theme =
            (settings && settings.theme) ||
            (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          var lang = (settings && settings.language) || 'en';
          document.documentElement.dataset.theme = theme;
          document.documentElement.lang = lang;
        } catch (e) {
          /* ignore — falls back to the dark default on the <html> element */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
